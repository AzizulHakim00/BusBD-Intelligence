services:
  - type: keyvalue
    name: busbd-redis
    plan: free
    ipAllowList: []
    maxmemoryPolicy: noeviction
    persistenceMode: off

  - type: web
    # This clean service and URL are the canonical BusBD deployment.
    # The older busbd-intelligence-7o16 hostname is redirected in index.html.
    name: busbd-intelligence
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /
    autoDeployTrigger: commit
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: postgres
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_USERNAME
        sync: false
      - key: DATABASE_PASSWORD
        sync: false
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: busbd-redis
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: TICKET_SECRET
        sync: false
      - key: DEMO_MODE
        value: "true"
      - key: DATABASE_FALLBACK_ENABLED
        value: "true"
      - key: DATABASE_PRIMARY_STARTUP_ATTEMPTS
        value: "15"
      - key: DATABASE_PRIMARY_CONNECT_RETRIES
        value: "1"
      - key: DATABASE_PRIMARY_CONNECTION_TIMEOUT
        value: "5000"
      - key: DB_POOL_MAX
        value: "3"
      - key: DB_POOL_MIN
        value: "0"
      - key: H2_CONSOLE_ENABLED
        value: "false"
      - key: REDIS_HEALTH_ENABLED
        value: "false"
      - key: JAVA_OPTS
        value: "-Xms64m -Xmx256m -XX:+UseSerialGC -XX:ActiveProcessorCount=1 -Djava.security.egd=file:/dev/./urandom"
