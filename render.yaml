services:
  - type: keyvalue
    name: busbd-redis
    region: singapore
    plan: free
    ipAllowList: []
    maxmemoryPolicy: noeviction
    persistenceMode: off

  - type: web
    name: busbd-intelligence
    repo: https://github.com/AzizulHakim00/BusBD-Intelligence
    branch: main
    runtime: docker
    region: singapore
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /actuator/health/readiness
    autoDeployTrigger: checksPass
    renderSubdomainPolicy: enabled
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: postgres
      - key: DATABASE_URL
        fromDatabase:
          name: busbd-postgres
          property: connectionString
      - key: DATABASE_USERNAME
        fromDatabase:
          name: busbd-postgres
          property: user
      - key: DATABASE_PASSWORD
        fromDatabase:
          name: busbd-postgres
          property: password
      - key: DATABASE_DRIVER
        value: org.postgresql.Driver
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: busbd-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: TICKET_SECRET
        generateValue: true
      - key: JWT_EXPIRATION_MINUTES
        value: "120"
      - key: DEMO_MODE
        value: "true"
      - key: DATABASE_FALLBACK_ENABLED
        value: "true"
      - key: DATABASE_PRIMARY_STARTUP_ATTEMPTS
        value: "15"
      - key: DATABASE_PRIMARY_CONNECT_RETRIES
        value: "1"
      - key: DATABASE_PRIMARY_CONNECTION_TIMEOUT
        value: "5000"
      - key: DB_POOL_MAX
        value: "3"
      - key: DB_POOL_MIN
        value: "0"
      - key: H2_CONSOLE_ENABLED
        value: "false"
      - key: REDIS_HEALTH_ENABLED
        value: "false"
      - key: SPRINGDOC_SWAGGER_UI_ENABLED
        value: "false"
      - key: SPRINGDOC_API_DOCS_ENABLED
        value: "false"
      - key: MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE
        value: "health,info"
      - key: MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS
        value: "never"
      - key: SERVER_FORWARD_HEADERS_STRATEGY
        value: "framework"
      - key: JAVA_OPTS
        value: "-Xms64m -Xmx256m -XX:+UseSerialGC -XX:ActiveProcessorCount=1 -Djava.security.egd=file:/dev/./urandom"

databases:
  - name: busbd-postgres
    databaseName: busbd
    user: busbd
    region: singapore
    plan: free
    postgresMajorVersion: "17"
    ipAllowList: []
