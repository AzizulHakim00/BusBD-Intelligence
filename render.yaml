services:
  - type: keyvalue
    name: busbd-redis
    plan: free
    ipAllowList: []
    maxmemoryPolicy: noeviction
    persistenceMode: off

  - type: web
    name: busbd-intelligence
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /actuator/health/liveness
    autoDeployTrigger: commit
    envVars:
      # Production uses the existing Neon PostgreSQL database. Secret values
      # remain configured in Render and are never committed to GitHub.
      - key: SPRING_PROFILES_ACTIVE
        value: postgres
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_USERNAME
        sync: false
      - key: DATABASE_PASSWORD
        sync: false
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: busbd-redis
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: TICKET_SECRET
        sync: false
      - key: DEMO_MODE
        value: "true"
      - key: DB_POOL_MAX
        value: "3"
      - key: DB_POOL_MIN
        value: "0"
      - key: DB_CONNECT_RETRIES
        value: "12"
      - key: DB_CONNECT_RETRY_INTERVAL
        value: "5s"
      - key: H2_CONSOLE_ENABLED
        value: "false"
      - key: REDIS_HEALTH_ENABLED
        value: "false"
      - key: JAVA_OPTS
        value: "-Xms64m -Xmx256m -XX:+UseSerialGC -XX:ActiveProcessorCount=1 -Djava.security.egd=file:/dev/./urandom"
