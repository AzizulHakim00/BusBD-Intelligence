services:
  - type: keyvalue
    name: busbd-redis
    plan: free
    ipAllowList: []
    maxmemoryPolicy: noeviction
    persistenceMode: off

  - type: web
    name: busbd-intelligence
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /actuator/health
    autoDeployTrigger: commit
    envVars:
      # The production service uses the existing Neon PostgreSQL database.
      # Secret values stay in Render and are never committed to GitHub.
      - key: SPRING_PROFILES_ACTIVE
        value: postgres
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_USERNAME
        sync: false
      - key: DATABASE_PASSWORD
        sync: false
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: busbd-redis
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: TICKET_SECRET
        sync: false
      - key: DEMO_MODE
        value: "true"
      - key: DB_POOL_MAX
        value: "5"
      - key: DB_POOL_MIN
        value: "1"
      - key: H2_CONSOLE_ENABLED
        value: "false"
      - key: REDIS_HEALTH_ENABLED
        value: "false"
      - key: JAVA_OPTS
        value: -XX:MaxRAMPercentage=72.0
