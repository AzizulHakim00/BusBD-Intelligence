services:
  - type: web
    name: busbd-intelligence
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /actuator/health
    autoDeployTrigger: commit
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: DEMO_MODE
        value: "true"
      - key: JAVA_OPTS
        value: -XX:MaxRAMPercentage=75.0
