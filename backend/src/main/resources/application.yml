server:
  port: ${PORT:8080}
  compression:
    enabled: true

spring:
  application:
    name: busbd-intelligence
  datasource:
    url: ${DATABASE_URL:jdbc:h2:mem:busbd;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE}
    username: ${DATABASE_USERNAME:sa}
    password: ${DATABASE_PASSWORD:}
    driver-class-name: ${DATABASE_DRIVER:org.h2.Driver}
    hikari:
      maximum-pool-size: ${DB_POOL_MAX:10}
      minimum-idle: ${DB_POOL_MIN:2}
      connection-timeout: 30000
  flyway:
    enabled: true
    locations: classpath:db/migration/common
    validate-on-migrate: true
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
  h2:
    console:
      enabled: ${H2_CONSOLE_ENABLED:true}
      path: /h2-console
  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}
      connect-timeout: 1200ms
      timeout: 1200ms
  jackson:
    serialization:
      write-dates-as-timestamps: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,flyway
  endpoint:
    health:
      show-details: always
  health:
    redis:
      enabled: ${REDIS_HEALTH_ENABLED:false}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
  api-docs:
    path: /api-docs

busbd:
  jwt:
    secret: ${JWT_SECRET:change-this-demo-secret-before-production-please-change-this}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:480}
  ticket:
    secret: ${TICKET_SECRET:${JWT_SECRET:change-this-demo-secret-before-production-please-change-this}}
  seat-lock-minutes: ${SEAT_LOCK_MINUTES:5}
  demo-mode: ${DEMO_MODE:true}
  ml-service-url: ${ML_SERVICE_URL:http://ml-service:8000}
  cancellation:
    full-refund-hours: ${FULL_REFUND_HOURS:24}
    partial-refund-hours: ${PARTIAL_REFUND_HOURS:6}
