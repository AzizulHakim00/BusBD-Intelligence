server:
  port: ${PORT:8080}
  forward-headers-strategy: ${SERVER_FORWARD_HEADERS_STRATEGY:framework}
  shutdown: graceful
  compression:
    enabled: true
  error:
    include-message: never
    include-stacktrace: never
    include-binding-errors: never

spring:
  application:
    name: busbd-intelligence
  lifecycle:
    timeout-per-shutdown-phase: 20s
  datasource:
    url: ${DATABASE_URL:jdbc:h2:mem:busbd;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE}
    username: ${DATABASE_USERNAME:sa}
    password: ${DATABASE_PASSWORD:}
    driver-class-name: ${DATABASE_DRIVER:org.h2.Driver}
    hikari:
      maximum-pool-size: ${DB_POOL_MAX:3}
      minimum-idle: ${DB_POOL_MIN:0}
      connection-timeout: ${DB_CONNECTION_TIMEOUT:30000}
      validation-timeout: 5000
      idle-timeout: 300000
  flyway:
    enabled: true
    locations: classpath:db/migration/common
    validate-on-migrate: true
    connect-retries: ${DB_CONNECT_RETRIES:12}
    connect-retries-interval: ${DB_CONNECT_RETRY_INTERVAL:5s}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: UTC
  h2:
    console:
      enabled: ${H2_CONSOLE_ENABLED:false}
      path: /h2-console
  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}
      connect-timeout: 1200ms
      timeout: 1200ms
  jackson:
    serialization:
      write-dates-as-timestamps: false

management:
  endpoints:
    web:
      exposure:
        include: ${MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE:health,info}
  endpoint:
    health:
      show-details: ${MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS:when_authorized}
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
    redis:
      enabled: ${REDIS_HEALTH_ENABLED:false}

springdoc:
  swagger-ui:
    enabled: ${SPRINGDOC_SWAGGER_UI_ENABLED:true}
    path: /swagger-ui.html
    operationsSorter: method
  api-docs:
    enabled: ${SPRINGDOC_API_DOCS_ENABLED:true}
    path: /api-docs

busbd:
  jwt:
    secret: ${JWT_SECRET:change-this-demo-secret-before-production-please-change-this}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:480}
  ticket:
    secret: ${TICKET_SECRET:${JWT_SECRET:change-this-demo-secret-before-production-please-change-this}}
  seat-lock-minutes: ${SEAT_LOCK_MINUTES:5}
  demo-mode: ${DEMO_MODE:true}
  ml-service-url: ${ML_SERVICE_URL:http://ml-service:8000}
  cancellation:
    full-refund-hours: ${FULL_REFUND_HOURS:24}
    partial-refund-hours: ${PARTIAL_REFUND_HOURS:6}
