server:
  port: ${PORT:8080}
  compression:
    enabled: true

spring:
  application:
    name: busbd-intelligence
  datasource:
    url: ${DATABASE_URL:jdbc:h2:mem:busbd;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE}
    username: ${DATABASE_USERNAME:sa}
    password: ${DATABASE_PASSWORD:}
    driver-class-name: ${DATABASE_DRIVER:org.h2.Driver}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: ${H2_CONSOLE_ENABLED:true}
      path: /h2-console
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      connect-timeout: 700ms
      timeout: 700ms
  jackson:
    serialization:
      write-dates-as-timestamps: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
  api-docs:
    path: /api-docs

busbd:
  jwt:
    secret: ${JWT_SECRET:change-this-demo-secret-before-production-please-change-this}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:480}
  seat-lock-minutes: ${SEAT_LOCK_MINUTES:5}
  demo-mode: ${DEMO_MODE:true}
  ml-service-url: ${ML_SERVICE_URL:http://ml-service:8000}
