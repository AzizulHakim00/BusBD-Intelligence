name: BusBD CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm run build

  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven
      - run: mvn -B -f backend/pom.xml test

  container:
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: busbd-intelligence:ci

  render-smoke:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: [container]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Wait for Render deployment and verify health
        shell: bash
        run: |
          set -euo pipefail
          base="https://busbd-intelligence.onrender.com"
          healthy="false"
          for attempt in $(seq 1 24); do
            echo "Render health attempt ${attempt}/24"
            if response=$(curl --fail --silent --show-error --location --max-time 45 "$base/actuator/health"); then
              echo "$response"
              if echo "$response" | grep -q '"status"[[:space:]]*:[[:space:]]*"UP"'; then
                healthy="true"
                break
              fi
            fi
            sleep 20
          done
          test "$healthy" = "true"
      - name: Verify homepage and public API
        shell: bash
        run: |
          set -euo pipefail
          base="https://busbd-intelligence.onrender.com"
          homepage=$(curl --fail --silent --show-error --location --max-time 45 "$base/")
          echo "$homepage" | grep -q "BusBD Intelligence"
          summary=$(curl --fail --silent --show-error --location --max-time 45 "$base/api/public/summary")
          echo "$summary"
          echo "$summary" | grep -q '"networkStatus"'
      - name: Publish production verification result
        if: always()
        shell: bash
        env:
          RESULT: ${{ job.status }}
          CHECKED_SHA: ${{ github.sha }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          checked_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout --orphan deployment-status-work
          git rm -rf . >/dev/null 2>&1 || true
          cat > render-smoke.json <<JSON
          {
            "service": "busbd-intelligence",
            "url": "https://busbd-intelligence.onrender.com/",
            "status": "$RESULT",
            "checkedCommit": "$CHECKED_SHA",
            "checkedAt": "$checked_at",
            "workflowRunId": "$RUN_ID"
          }
          JSON
          git add render-smoke.json
          git commit -m "Record Render production verification"
          git push --force origin HEAD:deployment-status
