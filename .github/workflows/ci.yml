name: BusBD CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - name: Diagnose and materialize V2.3 source
        shell: bash
        run: |
          set +e
          node scripts/materialize-v23.mjs > materialize.log 2>&1
          echo $? > materialize.status
          cat materialize.log
          exit 0
      - name: Upload V2.3 diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v23-diagnostic
          path: |
            frontend/materialize.log
            frontend/materialize.status
            frontend/v23/source.json.gz
            frontend/src
          retention-days: 1
      - name: Require successful materialization
        run: test "$(cat materialize.status)" = "0"
      - run: npm run build

  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven
      - run: mvn -B -f backend/pom.xml test

  container:
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: busbd-intelligence:ci
