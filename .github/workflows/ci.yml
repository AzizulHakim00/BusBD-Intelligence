name: BusBD CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install --no-audit --no-fund
      - run: npm run build

  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven
      - run: mvn -B -f backend/pom.xml test

  container:
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: busbd-intelligence:ci

      - name: Verify the packaged application can serve every frontend file
        shell: bash
        run: |
          set -euo pipefail
          docker run -d --name busbd-ci -p 18080:8080 \
            -e PORT=8080 \
            -e H2_CONSOLE_ENABLED=false \
            -e REDIS_HEALTH_ENABLED=false \
            busbd-intelligence:ci

          ready=false
          for attempt in $(seq 1 75); do
            if curl -fsS http://127.0.0.1:18080/actuator/health > /tmp/health.json; then
              ready=true
              break
            fi
            if ! docker inspect -f '{{.State.Running}}' busbd-ci 2>/dev/null | grep -q true; then
              docker logs busbd-ci
              exit 1
            fi
            sleep 2
          done

          if [ "$ready" != true ]; then
            docker logs busbd-ci
            exit 1
          fi

          grep -q '"status":"UP"' /tmp/health.json
          curl -fsS -D /tmp/home.headers http://127.0.0.1:18080/ -o /tmp/index.html
          grep -q 'Smarter journeys across Bangladesh' /tmp/index.html
          grep -qi '^Cache-Control:.*no-store' /tmp/home.headers

          asset=$(grep -oE 'src="/assets/[^"]+\.js"' /tmp/index.html | head -1 | cut -d'"' -f2)
          test -n "$asset"
          curl -fsS -D /tmp/asset.headers "http://127.0.0.1:18080${asset}" -o /tmp/app.js
          grep -q 'trusted buses across Bangladesh' /tmp/app.js
          grep -qi '^Cache-Control:.*immutable' /tmp/asset.headers

          curl -fsS -D /tmp/deployment.headers http://127.0.0.1:18080/deployment.json -o /tmp/deployment.json
          grep -q 'functional-har-design' /tmp/deployment.json
          grep -qi '^Cache-Control:.*no-store' /tmp/deployment.headers

      - name: Print container logs on failure
        if: failure()
        run: docker logs busbd-ci || true

      - name: Stop test container
        if: always()
        run: docker rm -f busbd-ci || true
