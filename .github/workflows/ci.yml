name: BusBD CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install --no-audit --no-fund
      - run: npm run build

  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven
      - run: mvn -B -f backend/pom.xml test

  container:
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: busbd-intelligence:ci

      - name: Start packaged application
        shell: bash
        run: |
          set -euo pipefail
          docker run -d --name busbd-ci -p 18080:8080 \
            -e PORT=8080 \
            -e H2_CONSOLE_ENABLED=false \
            -e REDIS_HEALTH_ENABLED=false \
            busbd-intelligence:ci

          for attempt in $(seq 1 75); do
            if curl -fsS http://127.0.0.1:18080/actuator/health > /tmp/health.json; then
              exit 0
            fi
            if ! docker inspect -f '{{.State.Running}}' busbd-ci 2>/dev/null | grep -q true; then
              docker logs busbd-ci
              exit 1
            fi
            sleep 2
          done

          docker logs busbd-ci
          exit 1

      - name: Verify health endpoint
        shell: bash
        run: |
          set -euo pipefail
          cat /tmp/health.json
          grep -Eq '"status"[[:space:]]*:[[:space:]]*"UP"' /tmp/health.json

      - name: Verify homepage and locate JavaScript bundle
        shell: bash
        run: |
          set -euo pipefail
          curl -fsS -D /tmp/home.headers http://127.0.0.1:18080/ -o /tmp/index.html
          cat /tmp/home.headers
          grep -q 'Smarter journeys across Bangladesh' /tmp/index.html
          grep -qi '^Cache-Control:.*no-store' /tmp/home.headers
          asset=$(grep -oE 'src="/assets/[^"]+\.js"' /tmp/index.html | head -1 | cut -d'"' -f2)
          test -n "$asset"
          printf '%s' "$asset" > /tmp/asset-path.txt

      - name: Verify JavaScript bundle is loadable
        shell: bash
        run: |
          set -euo pipefail
          asset=$(cat /tmp/asset-path.txt)
          curl -fsS -D /tmp/asset.headers "http://127.0.0.1:18080${asset}" -o /tmp/app.js
          cat /tmp/asset.headers
          test -s /tmp/app.js
          grep -Fq 'trusted buses across Bangladesh' /tmp/app.js
          grep -qi '^Cache-Control:.*immutable' /tmp/asset.headers

      - name: Verify deployment marker
        shell: bash
        run: |
          set -euo pipefail
          curl -fsS http://127.0.0.1:18080/deployment.json -o /tmp/deployment.json
          cat /tmp/deployment.json
          grep -q 'functional-har-design' /tmp/deployment.json

      - name: Print container logs on failure
        if: failure()
        run: docker logs busbd-ci || true

      - name: Stop test container
        if: always()
        run: docker rm -f busbd-ci || true
