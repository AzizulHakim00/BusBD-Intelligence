<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>BusBD Intelligence</title><style>:root{--bg:#06111b;--card:#0d1f2d;--line:#1e3a4b;--text:#edf8fb;--muted:#8ca7b7;--mint:#55efc4;--red:#ff747f}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 80% 0,#12394b,transparent 35%),var(--bg);color:var(--text);font-family:Arial,sans-serif}.wrap{max-width:1400px;margin:auto;padding:30px}.brand{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}h1,h2,p{margin:0}h1{font-size:30px}.eyebrow{color:var(--mint);font-size:10px;letter-spacing:2px;font-weight:700;margin-bottom:7px}button{border:0;border-radius:9px;padding:11px 15px;background:var(--mint);color:#062019;font-weight:800;cursor:pointer}.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}.card{background:linear-gradient(145deg,#102635,#091923);border:1px solid var(--line);border-radius:15px;padding:19px;margin-top:14px}.metric small,.muted{color:var(--muted);font-size:11px}.metric strong{font-size:28px;display:block;margin:8px 0}.grid{display:grid;grid-template-columns:2fr 1fr;gap:14px}.live{height:320px;background:linear-gradient(135deg,#0d2a35,#0a1721);border-radius:11px;position:relative;overflow:hidden}.route{position:absolute;border:2px dashed #37bba7;border-radius:50%;opacity:.55}.r1{width:75%;height:55%;top:20%;left:10%;transform:rotate(-8deg)}.r2{width:45%;height:75%;top:10%;left:30%;transform:rotate(28deg)}.bus{position:absolute;width:16px;height:16px;border-radius:50%;background:var(--mint);box-shadow:0 0 0 6px #55efc430}.b1{top:30%;left:25%}.b2{top:55%;left:58%}.b3{top:65%;left:78%}.b4{top:22%;left:67%}.alert{border:1px solid var(--line);border-radius:10px;padding:13px;margin-top:10px;font-size:12px}.alert b{color:var(--red)}table{width:100%;border-collapse:collapse;font-size:12px}th,td{text-align:left;padding:12px;border-bottom:1px solid var(--line)}th{color:var(--muted);font-size:10px}.status{color:var(--mint);font-weight:700}.delayed{color:var(--red)}form{display:grid;grid-template-columns:1fr 1fr auto;gap:10px}input{background:#071722;border:1px solid var(--line);border-radius:8px;color:var(--text);padding:12px}.result{margin-top:12px;color:var(--muted);line-height:1.6}@media(max-width:900px){.metrics{grid-template-columns:1fr 1fr}.grid{grid-template-columns:1fr}}@media(max-width:600px){.wrap{padding:20px 12px}.metrics{grid-template-columns:1fr}form{grid-template-columns:1fr}}</style></head><body><main class="wrap"><header class="brand"><div><p class="eyebrow">NATIONAL TRANSPORT COMMAND</p><h1>BusBD Intelligence</h1></div><button id="tick">Run live tick</button></header><section id="metrics" class="metrics"></section><section class="grid"><article class="card"><p class="eyebrow">LIVE NETWORK</p><h2>Fleet movement</h2><div class="live"><div class="route r1"></div><div class="route r2"></div><i class="bus b1"></i><i class="bus b2"></i><i class="bus b3"></i><i class="bus b4"></i></div></article><article class="card"><p class="eyebrow">AI SIGNALS</p><h2>Operational alerts</h2><div id="alerts"></div></article></section><section class="card"><p class="eyebrow">FLEET CONTROL</p><h2>Active buses</h2><div style="overflow:auto"><table><thead><tr><th>Vehicle</th><th>Operator</th><th>Status</th><th>Occupancy</th><th>Speed</th><th>ETA</th></tr></thead><tbody id="rows"></tbody></table></div></section><section class="card"><p class="eyebrow">BANGLA + ENGLISH</p><h2>AI travel planner</h2><form id="form"><input id="origin" value="Dhaka" required><input id="destination" value="Chattogram" required><button>Recommend</button></form><div id="result" class="result">Enter a journey to rank the available route.</div></section></main><script>const api=async(u,o={})=>{const r=await fetch(u,{headers:{'Content-Type':'application/json'},...o});return r.json()};async function load(){const[d,b]=await Promise.all([api('/api/dashboard'),api('/api/buses')]);metrics.innerHTML=[['Active buses',d.activeBuses],['Live trips',d.liveTrips],['Passengers today',d.passengersToday.toLocaleString()],['On-time rate',d.onTimeRate+'%']].map(x=>`<article class="card metric"><small>${x[0]}</small><strong>${x[1]}</strong><span class="muted">Real-time operational data</span></article>`).join('');rows.innerHTML=b.map(x=>`<tr><td>${x.registrationNumber}</td><td>${x.operatorName}</td><td class="${x.status==='DELAYED'?'delayed':'status'}">${x.status}</td><td>${x.occupiedSeats}/${x.capacity}</td><td>${Math.round(x.speedKph)} km/h</td><td>${x.etaMinutes} min</td></tr>`).join('');alerts.innerHTML=b.filter(x=>x.status==='DELAYED').map(x=>`<div class="alert"><b>Delay risk</b><p class="muted">${x.registrationNumber} is below corridor speed near ${x.nextStop}.</p></div>`).join('')+'<div class="alert"><span class="status">ETA model healthy</span><p class="muted">Model ETA-BD 2.4 is responding normally.</p></div>'}tick.onclick=async()=>{tick.textContent='Updating…';await api('/api/simulation/tick',{method:'POST'});await load();tick.textContent='Run live tick'};form.onsubmit=async e=>{e.preventDefault();result.textContent='Analyzing…';const d=await api('/api/recommendations',{method:'POST',body:JSON.stringify({origin:origin.value,destination:destination.value,passengerCount:1})});result.innerHTML=`<b>${d.recommendation}: ${d.routeCode}</b><br>${d.operator} · Fare ৳${d.fareBdt} · ${d.availableSeats} seats · ${d.delayRisk} risk<br>${d.explanation}`};load();</script></body></html>
